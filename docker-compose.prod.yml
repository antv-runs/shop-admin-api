version: '3.8'

services:
  app:
    image: antvrunss/shop-admin-api:1.0.0
    container_name: shop-admin-api
    working_dir: /var/www
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    image: antvrunss/shop-admin-api:1.0.0
    container_name: shop-admin-queue
    working_dir: /var/www
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      - mysql
    command: php artisan queue:work --tries=3 --timeout=90

  mysql:
    image: mysql:8.0
    container_name: shop-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shop
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: shop
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
